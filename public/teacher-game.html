
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Word Rain Game</title>
<script src="/socket.io/socket.io.js"></script>

<style>

body{
background:#ffe4f1;
font-family:sans-serif;
text-align:center;
}

#game{
position:relative;
height:520px;
border:4px solid #ff7fb0;
border-radius:20px;
margin:20px;
overflow:hidden;
background:white;
}

.word{
position:absolute;
background:#fff0f7;
padding:8px 14px;
border-radius:20px;
font-weight:bold;
color:#ff2f8b;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.popup{
position:absolute;
font-size:24px;
font-weight:bold;
color:#ff2f8b;
}

</style>

</head>

<body>

<h1>💖 Word Rain 🌸</h1>

<div id="game"></div>

<h3>🏆 랭킹</h3>
<div id="rank"></div>

<button onclick="end()">🛑 게임 종료</button>

<audio id="bgm" autoplay loop>
<source src="https://cdn.pixabay.com/audio/2023/03/23/audio_3c2c9f.mp3">
</audio>

<script>

const socket=io();
const game=document.getElementById("game");
let words={};

socket.on("spawnWord",(w)=>{

 const el=document.createElement("div");
 el.className="word";
 el.innerText="🍓 "+w.word;
 el.style.left=w.x+"%";
 el.dataset.id=w.id;

 game.appendChild(el);

 words[w.id]=el;

 let y=0;

 function fall(){

  if(!words[w.id]) return;

  y+=w.speed*20;
  el.style.top=y+"px";

  if(y>500){
    el.remove();
    delete words[w.id];
    return;
  }

  requestAnimationFrame(fall);

 }

 fall();

});

socket.on("wordSolved",(d)=>{

 const popup=document.createElement("div");
 popup.className="popup";

 popup.innerText="🎉 "+d.player+" +"+d.points+" "+(d.combo||"✨");

 popup.style.left="35%";
 popup.style.top="200px";

 game.appendChild(popup);

 setTimeout(()=>popup.remove(),2000);

});

socket.on("players",(p)=>{

 document.getElementById("rank").innerHTML=
 p.map((x,i)=>"🏅 "+(i+1)+" "+x.name+" "+x.score).join("<br>");

});

socket.on("gameEnded",(data)=>{

 let html="<h2>🏆 최종 순위</h2>";

 data.rankings.forEach((p,i)=>{
  html+= (i+1)+". "+p.name+" "+p.score+"점<br>";
 });

 html+="<h2>📚 오늘 나온 단어</h2>";

 data.words.forEach(w=>{
  html+=w.word+" = "+w.meaning+"<br>";
 });

 document.body.innerHTML=html;

});

function end(){
 socket.emit("endGame");
}

</script>

</body>
</html>
